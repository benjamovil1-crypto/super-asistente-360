<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Asistente 360</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px 20px 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .fecha {
      font-size: 16px;
      opacity: 0.8;
    }

    .tarjetas {
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      margin: 15px auto;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      background: #2a2a2a;
    }

    .bottom-bar {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .btn {
      background: #222;
      border: none;
      color: white;
      padding: 15px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>
<body>

<header>
  <h1>Super Asistente 360</h1>
  <div class="fecha" id="fecha"></div>
</header>

<div class="tarjetas">
  <div class="card">📅 Reuniones</div>
  <div class="card">🏢 Asambleas</div>
  <div class="card">📊 Informes</div>
</div>

<div class="bottom-bar">
  <button class="btn">🔍</button>
  <button class="btn">⚙️</button>
</div>

<script>
  function mostrarFecha() {
    const hoy = new Date();
    const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById("fecha").innerText =
      hoy.toLocaleDateString("es-ES", opciones);
  }

  document.addEventListener("DOMContentLoaded", function() {
    mostrarFecha();
  });
</script>

</body>
</html>
