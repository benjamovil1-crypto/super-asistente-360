<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Asistente 360 · Benjamín</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      :root {
        --bg: #060608;
        --card: #121214;
        --accent: #00ffff;
        --text: #e1e1e6;
        --visit: #00ff00;
        --assembly: #00ffff;
        --precursor: #ffaa00;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
        height: 100vh;
      }

      /* SPLASH CORREGIDO: Logo completo */
      #splash {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .splash-logo {
        width: 150px;
        height: 150px;
        object-fit: contain;
        margin-bottom: 25px;
      }

      .loader {
        width: 40px;
        height: 40px;
        border: 3px solid #333;
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* AJUSTES CORREGIDOS: Alineación y orden */
      .settings-container {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .setting-item {
        background: var(--card);
        padding: 15px;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .setting-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      /* INTERFAZ GENERAL */
      .screen {
        display: none;
        padding-bottom: 80px;
        animation: fadeIn 0.3s ease;
      }

      .active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        padding: 25px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .card {
        background: var(--card);
        border-radius: 20px;
        padding: 20px;
        margin: 0 20px 20px;
        border: 1px solid #222;
      }

      /* BOTONERA INFERIOR */
      .nav {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: rgba(18, 18, 20, 0.95);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: space-around;
        padding: 15px 0;
        border-top: 1px solid #222;
        z-index: 100;
      }

      .nav-item {
        color: #666;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 10px;
        gap: 5px;
      }

      .nav-item.active {
        color: var(--accent);
      }

      /* FORMULARIOS */
      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #aaa;
      }

      input,
      select {
        width: 100%;
        background: #1a1a1c;
        border: 1px solid #333;
        padding: 12px;
        border-radius: 10px;
        color: #fff;
        font-family: inherit;
      }

      .btn-primary {
        background: var(--accent);
        color: #000;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: 700;
        width: 100%;
        margin-top: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="icon.png" class="splash-logo" alt="Super Asistente 360">
      <div class="loader"></div>
    </div>
    <div id="home" class="screen active">
      <div class="header">
        <div>
          <h2 style="margin:0; font-family:'Space Mono';">S.A. 360</h2>
          <span class="header-name" style="color:var(--accent); font-size:14px;">Benjamín</span>
        </div>
        <i data-lucide="user" style="color:var(--accent)"></i>
      </div>
      <div class="card">
        <label>Filtrar Resumen por:</label>
        <select id="filtro-periodo" onchange="updateHome()">
          <option value="todo">Todo el año</option>
          <option value="s1">Semestre Sep-Feb</option>
          <option value="s2">Semestre Mar-Ago</option>
          <option value="visita">Por Número de Visita</option>
        </select>
      </div>
      <div class="card" id="resumen-stats" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div style="text-align: center;">
          <p style="color:#aaa; font-size:12px; margin:0;">GASOLINA ⛽️</p>
          <h3 id="stat-gasolina" style="margin:5px 0;">$0</h3>
        </div>
        <div style="text-align: center;">
          <p style="color:#aaa; font-size:12px; margin:0;">DESPENSA</p>
          <h3 id="stat-despensa" style="margin:5px 0;">$0</h3>
        </div>
        <div style="text-align: center;">
          <p style="color:#aaa; font-size:12px; margin:0;">VISITAS</p>
          <h3 id="stat-visitas" style="margin:5px 0;">0</h3>
        </div>
        <div style="text-align: center;">
          <p style="color:#aaa; font-size:12px; margin:0;">VACACIONES</p>
          <h3 id="stat-vacaciones" style="margin:5px 0;">0</h3>
        </div>
      </div>
    </div>
    <div id="registro" class="screen">
      <div class="card">
        <h3 style="margin-top:0">Nueva Semana / Editar</h3>
        <div class="form-group">
          <label>Tipo de Semana</label>
          <select id="tipo-semana">
            <option value="visita">Semana de Visita</option>
            <option value="asamblea">Asamblea</option>
            <option value="precursor">Semana Precursor</option>
            <option value="vacaciones">Vacaciones</option>
          </select>
        </div>
        <div class="form-group">
          <label>Número de Visita</label>
          <input type="number" id="num-visita" placeholder="Ej: 1">
        </div>
        <div class="form-group">
          <label>Despensa (Dinero $)</label>
          <input type="number" id="semana-despensa" placeholder="Cantidad para despensa">
        </div>
        <div class="form-group">
          <label>Gasolina ⛽️</label>
          <input type="number" id="semana-gasolina" placeholder="Gasto en gasolina">
        </div>
        <button class="btn-primary" onclick="guardarSemana()">GUARDAR DATOS</button>
      </div>
    </div>
    <div id="settings" class="screen">
      <div class="header">
        <h3>Ajustes</h3>
      </div>
      <div class="settings-container">
        <div class="setting-item">
          <div class="setting-info">
            <strong>Exportar Informe</strong>
            <span style="font-size:12px; color:#888;">Generar PDF en fondo blanco</span>
          </div>
          <button onclick="exportarPDF()" style="background:var(--accent); border:none; padding:8px 12px; border-radius:8px;">PDF</button>
        </div>
        <div class="setting-item">
          <div class="setting-info">
            <strong>Modo Crisis</strong>
            <span style="font-size:12px; color:#888;">Borrado rápido de seguridad</span>
          </div>
          <i data-lucide="shield-alert" style="color:#ff4444"></i>
        </div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-item active" onclick="showScreen('home')">
        <i data-lucide="home"></i>Inicio
      </div>
      <div class="nav-item" onclick="showScreen('registro')">
        <i data-lucide="plus-circle"></i>Registrar
      </div>
      <div class="nav-item" onclick="showScreen('settings')">
        <i data-lucide="settings"></i>Ajustes
      </div>
    </nav>
    <script>
      // Lógica de Navegación
      function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
      }
      // Simulación de carga
      setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        lucide.createIcons();
      }, 2000);
      // CRUD Datos
      function guardarSemana() {
        const data = JSON.parse(localStorage.getItem('sa360_data') || '[]');
        const nueva = {
            id: Date.now(),
            tipo: document.getElementById
